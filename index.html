<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Técnico Danfoss - VLT & VACON</title>
    <style>
        :root {
            --red-danfoss: #d71920;
            --blue-vacon: #00458b;
            --dark: #2d2d2d;
            --light-bg: #f4f7f6;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--light-bg); 
            margin: 0; 
            color: var(--dark); 
        }
        
        header { 
            background: white; 
            padding: 30px; 
            text-align: center; 
            border-bottom: 4px solid var(--red-danfoss); 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Navegación Fija */
        .nav-tabs { 
            display: flex; 
            background: var(--dark); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
        }
        .tab { 
            flex: 1; padding: 20px; text-align: center; color: white; 
            cursor: pointer; font-weight: bold; transition: 0.3s; border: none; background: none;
            font-size: 16px; text-transform: uppercase;
        }
        .tab:hover { background: #444; }
        .tab.active-vlt { background: var(--red-danfoss); }
        .tab.active-vacon { background: var(--blue-vacon); }

        /* Buscador */
        .search-box { padding: 25px; text-align: center; background: white; }
        #buscador { 
            width: 90%; max-width: 600px; padding: 15px 25px; 
            border-radius: 30px; border: 2px solid #ddd; outline: none; font-size: 16px;
        }

        /* Grid de Tarjetas */
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }

        .card { 
            background: white; border-radius: 12px; overflow: hidden; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.05); transition: 0.3s;
            display: flex; flex-direction: column; height: 100%;
            border: 1px solid #eee;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0,0,0,0.1); }
        
        .card-header { padding: 15px 20px; color: white; font-weight: bold; font-size: 13px; }
        .vlt-head { background: var(--red-danfoss); }
        .vacon-head { background: var(--blue-vacon); }

        .card-body { padding: 20px; flex-grow: 1; }
        .card-body h3 { margin: 0 0 10px 0; font-size: 19px; color: #111; }
        .card-body p { margin: 5px 0; color: #555; font-size: 14px; line-height: 1.5; }
        
        .tag { 
            display: inline-block; padding: 4px 12px; background: #f0f0f0; 
            border-radius: 15px; font-size: 11px; margin-top: 15px; font-weight: bold; color: #666;
        }

        /* Botón de descarga - El enlace directo */
        .btn-download {
            margin: 20px; padding: 14px; text-align: center;
            background: var(--dark); color: white; text-decoration: none;
            border-radius: 6px; font-weight: bold; transition: 0.3s;
            font-size: 14px;
        }
        .btn-download:hover { background: #000; }

        @media (max-width: 600px) { .nav-tabs { flex-direction: row; font-size: 12px; } .tab { padding: 15px 5px; } }
    </style>
</head>
<body>

<header>
    <h1>Repositorio de Manuales Danfoss</h1>
</header>

<nav class="nav-tabs">
    <button id="btn-vlt" class="tab active-vlt" onclick="setMarca('VLT')">VLT® Drives</button>
    <button id="btn-vacon" class="tab" onclick="setMarca('VACON')">VACON® Drives</button>
</nav>

<div class="search-box">
    <input type="text" id="buscador" placeholder="Buscar modelo (ej: FC 302, 102, NXP...)" onkeyup="render()">
</div>

<div class="container">
    <div id="main-grid" class="grid"></div>
</div>

<script>
    // DATOS CON ENLACES DIRECTOS (Sin carpetas locales para evitar error 404)
    const variadores = [
        // --- GAMA VLT ---
        { id: "FC51", marca: "VLT", nombre: "Micro Drive FC 51", serie: "M1-M5", desc: "Compacto, confiable y fácil de configurar.", manual: "https://assets.danfoss.com/documents/271209/AQ276736419659en-000101.pdf" },
        { id: "FC280", marca: "VLT", nombre: "Midi Drive FC 280", serie: "M1-M5", desc: "El sustituto moderno del VLT 2800.", manual: "https://assets.danfoss.com/documents/270803/AQ275647333269es-000801.pdf" },
        { id: "FC302", marca: "VLT", nombre: "AutomationDrive FC 302", serie: "A-F", desc: "Alto rendimiento para cualquier aplicación industrial.", manual: "https://assets.danfoss.com/documents/latest/210842/ANT410972624458es-000101.pdf" },
        { id: "FC102", marca: "VLT", nombre: "HVAC Drive FC 102", serie: "A-F", desc: "Optimizado para ventilación y aire acondicionado.", manual: "https://assets.danfoss.com/documents/210118/ANT403204368146es-000101.pdf" },
        { id: "FC202", marca: "VLT", nombre: "AQUA Drive FC 202", serie: "A-F", desc: "Especialista en tratamiento de agua y bombeo.", manual: "https://assets.danfoss.com/documents/210459/ANT406606013627es-000101.pdf" },

        // --- GAMA VACON ---
        { id: "V100IND", marca: "VACON", nombre: "VACON® 100 INDUSTRIAL", serie: "MR4-MR12", desc: "Versatilidad total para la industria pesada.", manual: "https://assets.danfoss.com/documents/317031/AB275637269262en-000901.pdf" },
        { id: "V100FLOW", marca: "VACON", nombre: "VACON® 100 FLOW", serie: "MR4-MR12", desc: "Control de flujo y funciones multipompa.", manual: "https://assets.danfoss.com/documents/319322/AB298035655957en-000801.pdf" },
        { id: "V20", marca: "VACON", nombre: "VACON® 20", serie: "MI1-MI5", desc: "Potencia compacta con PLC incorporado.", manual: "https://assets.danfoss.com/documents/270885/AQ361180907730es-000201.pdf" },
        { id: "NXP", marca: "VACON", nombre: "VACON® NXP Air Cooled", serie: "FR4-FR14", desc: "Control de alta precisión para aplicaciones exigentes.", manual: "https://assets.danfoss.com/documents/277037/AQ275638903263es-000601.pdf" }
    ];

    let marcaActual = 'VLT';

    function setMarca(m) {
        marcaActual = m;
        // Actualizar visual de pestañas
        document.getElementById('btn-vlt').className = `tab ${m === 'VLT' ? 'active-vlt' : ''}`;
        document.getElementById('btn-vacon').className = `tab ${m === 'VACON' ? 'active-vacon' : ''}`;
        render();
    }

    function render() {
        const query = document.getElementById('buscador').value.toLowerCase();
        const grid = document.getElementById('main-grid');
        
        // Filtro por marca y texto
        const filtrados = variadores.filter(v => 
            v.marca === marcaActual && 
            (v.nombre.toLowerCase().includes(query) || v.desc.toLowerCase().includes(query))
        );

        // Generar las tarjetas. Importante: href="${v.manual}" sin prefijos.
        grid.innerHTML = filtrados.map(v => `
            <div class="card">
                <div class="card-header ${v.marca === 'VLT' ? 'vlt-head' : 'vacon-head'}">
                    ${v.marca} DRIVE
                </div>
                <div class="card-body">
                    <h3>${v.nombre}</h3>
                    <p>${v.desc}</p>
                    <span class="tag">Frames: ${v.serie}</span>
                </div>
                <a href="${v.manual}" class="btn-download" target="_blank" rel="noopener noreferrer">
                    📄 DESCARGAR PDF OFICIAL
                </a>
            </div>
        `).join('');
    }

    // Iniciar al cargar la página
    window.onload = render;
</script>

</body>
</html>
